# EHA Clinics - AI Code Review Reusable Workflow
# Uses elek (model-agnostic AI code review) via OpenRouter (pi's native adapter).
# Supports DeepSeek V4-Pro and MIMO V2.5-Pro via OpenRouter model ids.
#
# NOTE: We previously routed through the Databricks AI Gateway (provider: openai,
# OpenAI-compatible). elek's pi client hung indefinitely on tool-enabled
# reasoning-model requests through that generic-adapter path — independent of
# thinking level, max_turns, and elek version. OpenRouter is elek's tested path.
# PII note: the gateway did input-PII masking; direct OpenRouter does not, but the
# diff already egressed to the same OpenRouter providers via the gateway.
#
# Security:
# - Actions pinned to full commit SHAs.
# - Least-privilege permissions: contents: read, pull-requests: write.
# - The MCP server has no code paths for approve/merge/close.
# - Token sanitization redacts GitHub token prefixes from model output.
#
# Usage:
#   jobs:
#     review:
#       uses: EHA-Clinics/.github/.github/workflows/ai-code-review.yml@<SHA-PIN>
#       secrets:
#         OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
#       with:
#         model: 'deepseek/deepseek-v4-pro'

name: AI Code Review

on:
  workflow_call:
    inputs:
      model:
        type: string
        default: 'deepseek/deepseek-v4-pro'
        description: 'OpenRouter model id (e.g., deepseek/deepseek-v4-pro, xiaomi/mimo-v2.5-pro)'
      trigger_phrase:
        type: string
        default: '@ai-review'
        description: >
          Phrase in the PR body or a comment that triggers a review. elek's own
          default is "@pi"; EHA standardizes on "@ai-review" (used in PR templates
          and the on-demand workflow gate). Without this, elek looks for "@pi",
          finds nothing, and exits "No trigger detected" — posting no review.
      thinking:
        type: string
        default: 'high'
        description: 'Reasoning effort: off, minimal, low, medium, high, xhigh'
      max_turns:
        type: number
        default: 20
        description: 'Maximum conversation turns per review'
      exclude_patterns:
        type: string
        default: 'pnpm-lock.yaml,package-lock.json,*.lock,dist/,node_modules/,*.min.js,*.min.css,.next/,coverage/,__snapshots__/,*.generated.ts,*.generated.tsx'
        description: 'Comma-separated file patterns to exclude from review'
      include_patterns:
        type: string
        default: ''
        description: 'Comma-separated file patterns to include (empty = all except excludes)'
      mode:
        type: string
        default: 'review'
        description: 'review (read-only) or review+edit (pushes fixes to pi/* branch)'
    secrets:
      OPENROUTER_API_KEY:
        required: true
        description: 'OpenRouter API key (same key that backs the Databricks AI Gateway external-model endpoints)'

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    name: AI Code Review (${{ inputs.model }})
    runs-on: ubuntu-latest
    # 10 min was too tight: dual-model thinking:high reviews of large diffs were
    # killed mid-run (job cancelled before posting), leaving stuck "analyzing…"
    # tracking comments. 20 gives headroom for the full-history checkout + review.
    timeout-minutes: 20
    steps:
      - name: Checkout PR
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: AI Code Review via OpenRouter
        uses: selimozten/elek@deb542d934255860ef588a58e41b8bd76e64cafa # v1.1.2 - pinned
        with:
          # pi's native openrouter adapter — elek's tested path. The OpenAI-compatible
          # Databricks AI Gateway (provider: openai) hung pi indefinitely on tool-enabled
          # reasoning-model requests, regardless of thinking/max_turns/elek version.
          provider: openrouter
          openrouter_api_key: ${{ secrets.OPENROUTER_API_KEY }}
          model: ${{ inputs.model }}
          trigger_phrase: ${{ inputs.trigger_phrase }}
          thinking: ${{ inputs.thinking }}
          max_turns: ${{ inputs.max_turns }}
          mode: ${{ inputs.mode }}
          sticky_comment: true
          # NOTE: elek 090437c does not accept exclude_patterns/include_patterns —
          # forwarding them raised "Unexpected input(s)" warnings and the values were
          # silently ignored. The workflow_call inputs are retained for forward-compat;
          # re-wire them here once a supporting elek release is pinned.
          # Structural safety: elek's MCP server only exposes create_inline_comment
          # and update_tracking_comment. No approve/merge/close code paths exist.
